# 뮤런 — 자체 N100 호스트 배포 compose.
#
# 정책: N100 = prod 단일. staging 은 N100 에서 안 돌린다 (deploy/README.md 참조).
#
# 사용 (호스트, 수동):
#   cd deploy
#   cp .env.example .env.prod
#   MURUN_ENV_FILE=.env.prod docker compose -p murun-prod --env-file .env.prod up -d
#
# 자동 배포는 GitHub Actions `Deploy` workflow 가 처리한다 (`.github/workflows/deploy.yml`).
# volume 이름은 project name 앞에 붙어 분리됨 (e.g. `murun-prod_data`).

name: murun

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: ghcr.io/boostcampwm-snu-2026-1/murun-peterabcd:${IMAGE_TAG:-local}
    restart: unless-stopped
    env_file:
      - ${MURUN_ENV_FILE:-.env}
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    networks:
      - murun_net
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    networks:
      - murun_net
    environment:
      # Caddyfile 안에서 {$DOMAIN} 으로 참조
      DOMAIN: ${DOMAIN:-:80}

volumes:
  data:
  uploads:
  caddy_data:
  caddy_config:

networks:
  murun_net:
    driver: bridge
