# 뮤런 — 자체 N100 호스트 배포 compose.
#
# 사용 (호스트):
#   cd deploy
#   cp .env.example .env       # 같은 디렉터리에 prod env 보관 (gitignore됨)
#   docker compose up -d --build
#
# staging 과 prod 동시 운영 시:
#   docker compose -p murun-staging --env-file .env.staging up -d --build
#   docker compose -p murun-prod    --env-file .env.prod    up -d --build
# (volume 이름이 project name 앞에 붙어 자동 분리)

name: murun

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: ghcr.io/boostcampwm-snu-2026-1/murun:${IMAGE_TAG:-local}
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    networks:
      - murun_net
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    networks:
      - murun_net
    environment:
      # Caddyfile 안에서 {$DOMAIN} 으로 참조
      DOMAIN: ${DOMAIN:-:80}

volumes:
  data:
  uploads:
  caddy_data:
  caddy_config:

networks:
  murun_net:
    driver: bridge
